name: CI

on:
  push:
    branches: ["main"]
    tags:     ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Run tests
        run: python tests/test_entropy.py

      - name: Entropy self-test (dry-run)
        run: |
          pip install -e .
          entropy --version
          entropy run \
            --spec examples/shopapi.yaml \
            --target http://localhost:8000 \
            --llm mock \
            --profile quick \
            --no-rate-limit-check \
            --sarif /tmp/entropy-selftest.sarif \
            --output /tmp/entropy-selftest

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always() && matrix.python-version == '3.11'
        with:
          sarif_file: /tmp/entropy-selftest.sarif
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff + black
        run: pip install ruff black
      - name: Ruff check
        run: ruff check entropy/ --select E,F,I,UP --ignore E501,B008
        continue-on-error: true
      - name: Black format check
        run: black --check --diff entropy/
        continue-on-error: true

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel + sdist
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/entropy-chaos/
    permissions:
      id-token: write   # OIDC Trusted Publishing — no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Setup: pypi.org → Account → Publishing → Add trusted publisher
        # owner: <your-github-username>, repo: entropy-chaos, workflow: ci.yml

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: dist/*
