openapi: "3.0.3"
info:
  title: "ShopAPI"
  description: "Demo e-commerce API for Entropy chaos testing"
  version: "1.0.0"

servers:
  - url: "http://localhost:8000/api/v1"

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Order:
      type: object
      required: [product_id, quantity]
      properties:
        product_id:   { type: integer, example: 42 }
        quantity:     { type: integer, example: 1, minimum: 1 }
        coupon_code:  { type: string,  example: "SAVE10" }
        unit_price:   { type: number,  example: 29.99 }

    Payment:
      type: object
      required: [order_id, amount, method]
      properties:
        order_id:     { type: integer }
        amount:       { type: number,  example: 29.99 }
        method:       { type: string,  enum: [credit_card, paypal, crypto] }
        coupon_code:  { type: string }

    UserProfile:
      type: object
      properties:
        name:         { type: string }
        email:        { type: string, format: email }
        role:         { type: string, enum: [user, moderator, admin] }
        is_admin:     { type: boolean }
        verified:     { type: boolean }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string }

paths:
  /auth/login:
    post:
      tags: [auth]
      summary: "Authenticate user and receive JWT"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200": { description: "JWT token returned" }
        "401": { description: "Invalid credentials" }

  /users/{user_id}:
    get:
      tags: [users]
      summary: "Get user profile by ID"
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: "User profile" }
        "404": { description: "Not found" }

    patch:
      tags: [users]
      summary: "Update own user profile"
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserProfile" }
      responses:
        "200": { description: "Updated profile" }

  /orders:
    post:
      tags: [orders]
      summary: "Place a new order"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Order" }
      responses:
        "201": { description: "Order created" }
        "400": { description: "Invalid order" }

  /orders/{order_id}:
    get:
      tags: [orders]
      summary: "Get order details"
      parameters:
        - name: order_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: "Order details" }

    delete:
      tags: [orders]
      summary: "Cancel an order"
      parameters:
        - name: order_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204": { description: "Cancelled" }

  /payments:
    post:
      tags: [payments]
      summary: "Process payment for an order"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Payment" }
      responses:
        "200": { description: "Payment processed" }
        "402": { description: "Payment failed" }

  /vouchers/{voucher_code}/redeem:
    post:
      tags: [vouchers]
      summary: "Redeem a one-time voucher"
      parameters:
        - name: voucher_code
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: "Voucher redeemed" }
        "409": { description: "Already redeemed" }

  /admin/users:
    get:
      tags: [admin]
      summary: "List all users (admin only)"
      parameters:
        - name: role
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200": { description: "User list" }
        "403": { description: "Forbidden" }

  /products/search:
    get:
      tags: [products]
      summary: "Search products"
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - name: min_price
          in: query
          schema: { type: number }
        - name: max_price
          in: query
          schema: { type: number }
        - name: category
          in: query
          schema: { type: string }
      responses:
        "200": { description: "Search results" }
