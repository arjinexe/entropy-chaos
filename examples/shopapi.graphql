# ShopAPI GraphQL Schema
# Test with: entropy run --spec examples/shopapi.graphql --target http://localhost:4000

type Query {
  me: User
  user(id: ID!): User
  users(role: String limit: Int offset: Int): [User]
  order(id: ID!): Order
  orders(userId: ID status: String): [Order]
  product(id: ID!): Product
  products(category: String minPrice: Float maxPrice: Float): [Product]
  searchProducts(q: String!): [Product]
}

type Mutation {
  login(email: String! password: String!): AuthPayload
  register(name: String! email: String! password: String!): AuthPayload
  updateProfile(userId: ID! name: String email: String role: String isAdmin: Boolean): User
  createOrder(productId: ID! quantity: Int! couponCode: String): Order
  cancelOrder(id: ID!): Boolean
  processPayment(orderId: ID! amount: Float! method: String!): PaymentResult
  redeemVoucher(code: String!): VoucherResult
  deleteUser(id: ID!): Boolean
}

type User {
  id: ID
  name: String
  email: String
  role: String
  isAdmin: Boolean
  verified: Boolean
  orders: [Order]
  createdAt: String
}

type Order {
  id: ID
  userId: ID
  productId: ID
  quantity: Int
  totalPrice: Float
  status: String
  couponCode: String
  createdAt: String
}

type Product {
  id: ID
  name: String
  price: Float
  category: String
  stock: Int
}

type AuthPayload {
  token: String
  user: User
}

type PaymentResult {
  success: Boolean
  transactionId: String
  amount: Float
}

type VoucherResult {
  success: Boolean
  discount: Float
  message: String
}
