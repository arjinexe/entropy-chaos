# Entropy configuration example — v0.3.0
# Copy to project root: cp examples/entropy.yml entropy.yml

target: http://localhost:8000
spec: examples/shopapi.yaml

llm:
  backend: mock        # change to: anthropic | openai | gemini | groq | ollama
  # model: claude-haiku-4-5
  # api_key: sk-ant-...  (or use ANTHROPIC_API_KEY env var)

scan:
  profile: standard    # quick | standard | full | stealth | ci
  live: false          # set true to send real HTTP requests
  discover: false      # set true to crawl target without a spec
  baseline_diff: true  # filter false positives via baseline comparison
  rate_limit_check: true
  save_history: true

http:
  verify_ssl: true
  max_retries: 3
  timeout: 10
  # proxy: http://127.0.0.1:8080   # Burp Suite / other proxy

output:
  dir: entropy-report
  html: true
  fail_on: high       # exit 1 if critical/high findings found
  # sarif: results.sarif   # enable for GitHub Code Scanning
  # junit: entropy-report/junit.xml   # enable for GitLab/Jenkins

# Watch mode (optional)
# watch:
#   enabled: true
#   interval: 300
#   slack_webhook: https://hooks.slack.com/...
